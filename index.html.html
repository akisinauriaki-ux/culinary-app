<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1208">
<title>My Recipe Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d09;
    --surface: #1c1810;
    --surface2: #252015;
    --border: #2e2818;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --cream: #f0e8d0;
    --cream-dim: #9e9278;
    --red: #b84040;
    --text: #e8dfc8;
    --text-dim: #7a7264;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 52px 20px 20px;
    background: linear-gradient(180deg, #1c1810 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.02em;
  }

  .recipe-count {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 44px 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold-dim); }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
    font-size: 16px;
  }

  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: none;
    padding: 4px;
    line-height: 1;
  }

  /* Stats bar */
  .stats-bar {
    padding: 10px 20px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    min-height: 36px;
    display: flex;
    align-items: center;
  }

  .stats-bar span { color: var(--gold); }

  /* Results */
  .results {
    padding: 8px 0 80px;
  }

  .recipe-card {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    active-bg: var(--surface);
  }

  .recipe-card:active { background: var(--surface); }

  .recipe-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.35;
    margin-bottom: 5px;
  }

  .recipe-meta {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recipe-meta .book-tag {
    color: var(--gold-dim);
  }

  /* Highlight */
  mark {
    background: transparent;
    color: var(--gold);
    font-weight: 500;
  }

  /* Empty state */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream-dim);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* Loading */
  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .loading::after {
    content: '';
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gold);
    margin: 16px auto 0;
    animation: loadbar 1s ease-in-out infinite alternate;
  }

  @keyframes loadbar { from { transform: scaleX(0.3); opacity: 0.4; } to { transform: scaleX(1); opacity: 1; } }

  /* Detail overlay */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-overflow-scrolling: touch;
  }

  .detail-overlay.open {
    transform: translateX(0);
  }

  .detail-header {
    padding: 52px 20px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 16px;
    padding: 0;
  }

  .back-btn::before { content: '←'; font-size: 16px; }

  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .detail-book {
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  .detail-body {
    padding: 24px 20px 80px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 32px;
  }

  .ingredients-list li {
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .ingredients-list li::before {
    content: '—';
    color: var(--gold-dim);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .author-notes {
    font-size: 14px;
    color: var(--cream-dim);
    line-height: 1.75;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    border-left: 2px solid var(--gold-dim);
    padding-left: 16px;
  }

  .no-notes {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Scroll indicator */
  .scroll-hint {
    text-align: center;
    padding: 12px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Initial browse state */
  .browse-grid {
    padding: 16px 20px;
  }

  .browse-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .book-chips {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .book-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .book-chip:active { border-color: var(--gold-dim); }

  .book-chip-name {
    font-size: 13px;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
  }

  .book-chip-count {
    font-size: 11px;
    color: var(--gold-dim);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Recipe Library</div>
    <div class="recipe-count" id="totalCount">Loading...</div>
  </div>
  <div class="search-wrap">
    <input type="search" class="search-input" id="searchInput"
      placeholder="Search recipes, ingredients…"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <span class="search-icon" id="searchIcon">⌕</span>
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div id="mainContent">
  <div class="loading">Loading your library</div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">Back</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-book" id="detailBook"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
  let allRecipes = [];
  let currentResults = [];
  let searchTimer = null;

  // Load JSON
  async function loadData() {
    try {
      const res = await fetch('recipes.json');
      if (!res.ok) throw new Error('not found');
      allRecipes = await res.json();
      init();
    } catch(e) {
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠</div>
          <div class="empty-title">recipes.json not found</div>
          <div class="empty-sub">Place recipes.json in the same folder as this HTML file and open it locally, or deploy both files together.</div>
        </div>`;
      document.getElementById('statsBar').textContent = 'No data loaded';
    }
  }

  function init() {
    document.getElementById('totalCount').textContent = `${allRecipes.length.toLocaleString()} recipes`;
    showBrowse();
    setupSearch();
  }

  function setupSearch() {
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const icon = document.getElementById('searchIcon');

    input.addEventListener('input', () => {
      const q = input.value.trim();
      clearBtn.style.display = q ? 'block' : 'none';
      icon.style.display = q ? 'none' : 'block';
      clearTimeout(searchTimer);
      if (q.length === 0) { showBrowse(); return; }
      if (q.length < 2) { updateStats(`Type more to search…`); return; }
      searchTimer = setTimeout(() => doSearch(q), 180);
    });
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('searchIcon').style.display = 'block';
    showBrowse();
    document.getElementById('searchInput').focus();
  }

  function updateStats(text) {
    document.getElementById('statsBar').innerHTML = text;
  }

  function showBrowse() {
    // Show books summary
    const bookMap = {};
    allRecipes.forEach(r => {
      const b = shortBookName(r.sourceBook);
      bookMap[b] = (bookMap[b] || 0) + 1;
    });

    const chips = Object.entries(bookMap)
      .sort((a, b) => b[1] - a[1])
      .map(([name, count]) => `
        <div class="book-chip" onclick="searchByBook('${name.replace(/'/g, "\\'")}')">
          <div class="book-chip-name">${name}</div>
          <div class="book-chip-count">${count}</div>
        </div>`).join('');

    document.getElementById('mainContent').innerHTML = `
      <div class="browse-grid">
        <div class="browse-label">Browse by book</div>
        <div class="book-chips">${chips}</div>
      </div>`;

    updateStats(`<span>${allRecipes.length.toLocaleString()}</span> recipes ready`);
  }

  function searchByBook(bookName) {
    document.getElementById('searchInput').value = bookName;
    document.getElementById('clearBtn').style.display = 'block';
    document.getElementById('searchIcon').style.display = 'none';
    doSearch(bookName);
  }

  function doSearch(query) {
    const terms = query.toLowerCase().split(/\s+/).filter(Boolean);

    const scored = allRecipes.map(r => {
      const nameLow = r.name.toLowerCase();
      const bookLow = (r.sourceBook || '').toLowerCase();
      const ingText = (r.ingredients || []).join(' ').toLowerCase();
      const notesLow = (r.authorNotes || '').toLowerCase();
      const allText = nameLow + ' ' + ingText + ' ' + notesLow + ' ' + bookLow;

      let score = 0;
      let allMatch = true;
      for (const term of terms) {
        if (nameLow.includes(term)) score += 10;
        else if (ingText.includes(term)) score += 4;
        else if (notesLow.includes(term)) score += 2;
        else if (bookLow.includes(term)) score += 1;
        else { allMatch = false; break; }
      }
      return allMatch ? { recipe: r, score } : null;
    }).filter(Boolean).sort((a, b) => b.score - a.score);

    currentResults = scored.map(s => s.recipe);
    renderResults(currentResults, query);
  }

  function renderResults(recipes, query) {
    const terms = query.toLowerCase().split(/\s+/).filter(Boolean);

    if (recipes.length === 0) {
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽</div>
          <div class="empty-title">No recipes found</div>
          <div class="empty-sub">Try different words — ingredients, technique, or cuisine.</div>
        </div>`;
      updateStats(`No results for "${query}"`);
      return;
    }

    updateStats(`<span>${recipes.length.toLocaleString()}</span> results for "${query}"`);

    const html = recipes.map((r, i) => {
      const name = highlight(r.name, terms);
      const book = shortBookName(r.sourceBook);
      return `<div class="recipe-card" onclick="openDetail(${indexOf(r)})">
        <div class="recipe-name">${name}</div>
        <div class="recipe-meta"><span class="book-tag">${book}</span></div>
      </div>`;
    }).join('');

    document.getElementById('mainContent').innerHTML = `<div class="results">${html}</div>`;
  }

  function indexOf(recipe) {
    return allRecipes.findIndex(r => r.id === recipe.id);
  }

  function highlight(text, terms) {
    let result = escHtml(text);
    terms.forEach(term => {
      const re = new RegExp(`(${escRe(term)})`, 'gi');
      result = result.replace(re, '<mark>$1</mark>');
    });
    return result;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function escRe(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  }

  function shortBookName(sourceBook) {
    if (!sourceBook) return 'Unknown';
    // Extract title before em dash or first comma
    const parts = sourceBook.split(/\s*[—–]\s*/);
    if (parts.length > 1) return parts[0].trim();
    return sourceBook.split(',')[0].trim();
  }

  function openDetail(index) {
    const r = allRecipes[index];
    document.getElementById('detailTitle').textContent = r.name;
    document.getElementById('detailBook').textContent = r.sourceBook || '';

    const ingredients = (r.ingredients || []).map(ing =>
      `<li>${escHtml(ing)}</li>`).join('');

    const notes = r.authorNotes
      ? `<p class="author-notes">${escHtml(r.authorNotes)}</p>`
      : `<p class="no-notes">No author notes for this recipe.</p>`;

    document.getElementById('detailBody').innerHTML = `
      <div class="section-label">Ingredients</div>
      <ul class="ingredients-list">${ingredients}</ul>
      <div class="section-label">Author's Notes</div>
      ${notes}
    `;

    const overlay = document.getElementById('detailOverlay');
    overlay.classList.add('open');
    overlay.scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Swipe back gesture
  let touchStartX = 0;
  document.getElementById('detailOverlay').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.getElementById('detailOverlay').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (touchStartX < 40 && dx > 60) closeDetail();
  }, { passive: true });

  loadData();
</script>
</body>
</html>
