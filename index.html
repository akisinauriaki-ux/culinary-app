<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#100e0a">
<title>Culinary Library</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #100e0a;
  --bg2:       #181410;
  --bg3:       #201c16;
  --border:    #2a251c;
  --border2:   #352e22;
  --gold:      #c8943a;
  --gold2:     #e8b86d;
  --gold-dim:  #6b4e1e;
  --cream:     #ede4cf;
  --cream2:    #c4b896;
  --muted:     #7a7060;
  --red:       #9b3a2e;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  overflow: hidden;
}

/* API KEY GATE */
#apiGate {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 28px;
}

.gate-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 44px;
}

.gate-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300;
  color: var(--cream);
  text-align: center;
  margin-bottom: 10px; line-height: 1.3;
}

.gate-sub {
  font-size: 13px; color: var(--muted);
  text-align: center; line-height: 1.7;
  margin-bottom: 36px;
}
.gate-sub a { color: var(--gold); text-decoration: none; }

.gate-input {
  width: 100%; max-width: 360px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.04em;
  outline: none; margin-bottom: 14px;
  -webkit-appearance: none;
}
.gate-input:focus { border-color: var(--gold-dim); }
.gate-input::placeholder { color: var(--muted); }

.gate-btn {
  width: 100%; max-width: 360px;
  background: var(--gold); border: none;
  border-radius: 10px; padding: 14px;
  color: var(--bg);
  font-family: 'Jost', sans-serif;
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s;
}
.gate-btn:active { background: var(--gold2); }

.gate-note {
  font-size: 11px; color: var(--muted);
  text-align: center; margin-top: 16px; line-height: 1.6;
}

/* MAIN APP */
#app {
  display: none;
  flex-direction: column;
  height: 100%;
}

/* HEADER */
.header {
  flex-shrink: 0;
  padding: 52px 20px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.header-row {
  display: flex; align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.app-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 300;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold2);
}

.total-count { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }

.search-wrap { position: relative; }

.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 40px 12px 16px;
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  font-size: 15px; font-weight: 300;
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--gold-dim); }

.search-clear {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--muted); font-size: 16px;
  cursor: pointer; display: none; padding: 4px; line-height: 1;
}

/* STATS */
.stats {
  flex-shrink: 0;
  padding: 9px 20px;
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.07em;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.stats b { color: var(--gold); font-weight: 400; }

/* SCROLL */
.scroll-area {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* BROWSE */
.browse-section { padding: 20px 20px 80px; }

.section-head {
  font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px;
}

.book-list { display: flex; flex-direction: column; gap: 8px; }

.book-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  cursor: pointer; transition: border-color 0.15s;
}
.book-row:active { border-color: var(--gold-dim); }

.book-row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  color: var(--cream); line-height: 1.3;
  flex: 1; padding-right: 12px;
}

.book-row-count { font-size: 12px; color: var(--gold-dim); flex-shrink: 0; }

/* RESULTS */
.results-list { padding-bottom: 80px; }

.recipe-row {
  padding: 15px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
}
.recipe-row:active { background: var(--bg2); }

.recipe-row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px; font-weight: 400;
  color: var(--cream); line-height: 1.3; margin-bottom: 4px;
}

.recipe-row-book {
  font-size: 11px; color: var(--gold-dim);
  letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

mark { background: none; color: var(--gold2); font-weight: 500; }

/* EMPTY */
.empty-state { padding: 70px 24px; text-align: center; }
.empty-icon { font-size: 36px; margin-bottom: 18px; opacity: 0.35; }
.empty-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--cream2); margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* DETAIL PANEL */
.panel {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel.open { transform: translateX(0); }

.panel-header {
  flex-shrink: 0;
  padding: 52px 20px 18px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: none;
  color: var(--gold); font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 14px; padding: 0;
}

.panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 400;
  color: var(--cream); line-height: 1.3; margin-bottom: 6px;
}

.panel-book { font-size: 11px; color: var(--gold-dim); letter-spacing: 0.04em; line-height: 1.5; }

.panel-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 24px 20px 80px;
}

/* SECTION LABEL */
.sec-label {
  font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* INGREDIENTS */
.ing-list { list-style: none; margin-bottom: 28px; }
.ing-list li {
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 14px; color: var(--cream); line-height: 1.5;
  display: flex; gap: 10px; align-items: flex-start;
}
.ing-list li::before { content:'—'; color:var(--gold-dim); flex-shrink:0; margin-top:1px; }

/* AUTHOR NOTES */
.author-notes {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 300; font-style: italic;
  color: var(--cream2); line-height: 1.8;
  border-left: 2px solid var(--gold-dim);
  padding-left: 16px; margin-bottom: 32px;
}
.no-notes { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 32px; }

/* ENHANCE BUTTON */
.enhance-btn {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--gold-dim);
  border-radius: 12px; padding: 16px;
  color: var(--gold2);
  font-family: 'Jost', sans-serif;
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: background 0.2s, border-color 0.2s;
  margin-bottom: 32px;
}
.enhance-btn:active { background: #2a2318; }
.enhance-btn:disabled { opacity: 0.5; cursor: default; }
.sparkle { font-size: 16px; }

/* LOADING DOTS */
.enhancing-state {
  display: flex; flex-direction: column;
  align-items: center; padding: 40px 0; gap: 16px;
}
.enhancing-dots { display: flex; gap: 6px; }
.enhancing-dots span {
  width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%;
  animation: dpulse 1.2s ease-in-out infinite;
}
.enhancing-dots span:nth-child(2) { animation-delay: 0.2s; }
.enhancing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dpulse {
  0%,80%,100% { transform:scale(0.6); opacity:0.3; }
  40% { transform:scale(1); opacity:1; }
}
.enhancing-label { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

/* REPORT */
.report-wrap { margin-top: 4px; }

.report-section { margin-bottom: 26px; }

.report-section-title {
  font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.report-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

.report-text {
  font-size: 14px; line-height: 1.8; color: var(--cream);
}
.report-text p { margin-bottom: 10px; }
.report-text p:last-child { margin-bottom: 0; }
.report-text strong { color: var(--gold2); font-weight: 500; }

.error-msg {
  background: rgba(155,58,46,0.15);
  border: 1px solid var(--red);
  border-radius: 10px; padding: 16px;
  font-size: 13px; color: #e88070; line-height: 1.6;
}
</style>
</head>
<body>

<div id="apiGate">
  <div class="gate-logo">Culinary Intelligence</div>
  <div class="gate-title">Enter your<br>Anthropic API Key</div>
  <div class="gate-sub">
    Stored only in this session.<br>
    Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </div>
  <input class="gate-input" type="password" id="apiKeyInput"
    placeholder="sk-ant-…" autocomplete="off" spellcheck="false">
  <button class="gate-btn" onclick="saveKey()">Enter Library</button>
  <div class="gate-note">Saved on this device. You won't be asked again.</div>
</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <div class="app-name">Recipe Library</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="total-count" id="totalCount"></div>
        <button onclick="resetKey()" style="background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--muted);font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.08em;cursor:pointer;">API KEY</button>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="search" id="searchInput"
        placeholder="Search recipe or ingredient…"
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="stats" id="statsBar"></div>

  <div class="scroll-area">
    <div id="mainContent"></div>
  </div>
</div>

<div class="panel" id="detailPanel">
  <div class="panel-header">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div class="panel-title" id="detailTitle"></div>
    <div class="panel-book" id="detailBook"></div>
  </div>
  <div class="panel-body" id="detailBody"></div>
</div>

<script>
let allRecipes = [];
let apiKey = '';
let searchTimer = null;
let enhancementCache = {};

function resetKey() {
  localStorage.removeItem('culinary_api_key');
  apiKey = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('apiGate').style.display = 'flex';
  document.getElementById('apiKeyInput').value = '';
}

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('sk-')) {
    document.getElementById('apiKeyInput').style.borderColor = '#9b3a2e';
    return;
  }
  apiKey = val;
  localStorage.setItem('culinary_api_key', val);
  document.getElementById('apiGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
}

document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveKey();
});

// Auto-load saved key
const savedKey = localStorage.getItem('culinary_api_key');
if (savedKey) {
  apiKey = savedKey;
  document.getElementById('apiGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData();
}

async function loadData() {
  try {
    const res = await fetch('recipes.json');
    if (!res.ok) throw new Error();
    allRecipes = await res.json();
    document.getElementById('totalCount').textContent = allRecipes.length.toLocaleString() + ' recipes';
    showBrowse();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠</div>
        <div class="empty-title">recipes.json not found</div>
        <div class="empty-sub">Place recipes.json in the same folder as this HTML file.</div>
      </div>`;
  }
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { showBrowse(); return; }
  if (q.length < 2) return;
  searchTimer = setTimeout(() => doSearch(q), 160);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  showBrowse();
}

function doSearch(query) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const results = [];

  for (const r of allRecipes) {
    const nameLow = r.name.toLowerCase();
    const ingText = (r.ingredients||[]).join(' ').toLowerCase();
    const notesLow = (r.authorNotes||'').toLowerCase();
    const bookLow = (r.sourceBook||'').toLowerCase();

    let score = 0, match = true;
    for (const t of terms) {
      if      (nameLow.includes(t))  score += 10;
      else if (ingText.includes(t))  score += 5;
      else if (notesLow.includes(t)) score += 2;
      else if (bookLow.includes(t))  score += 1;
      else { match = false; break; }
    }
    if (match) results.push({ r, score });
  }

  results.sort((a,b) => b.score - a.score);
  const recipes = results.map(x => x.r);

  document.getElementById('statsBar').innerHTML = recipes.length === 0
    ? `No results for "${esc(query)}"`
    : `<b>${recipes.length.toLocaleString()}</b> results for "${esc(query)}"`;

  if (recipes.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍽</div>
        <div class="empty-title">Nothing found</div>
        <div class="empty-sub">Try an ingredient, technique, or cuisine style.</div>
      </div>`;
    return;
  }

  const rows = recipes.map(r => {
    const name = hlText(esc(r.name), terms);
    return `<div class="recipe-row" onclick="openDetail('${r.id}')">
      <div class="recipe-row-name">${name}</div>
      <div class="recipe-row-book">${esc(shortBook(r.sourceBook))}</div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `<div class="results-list">${rows}</div>`;
}

function showBrowse() {
  const bookMap = {};
  for (const r of allRecipes) {
    const b = shortBook(r.sourceBook);
    bookMap[b] = (bookMap[b]||0) + 1;
  }

  const rows = Object.entries(bookMap)
    .sort((a,b) => b[1]-a[1])
    .map(([name, count]) => `
      <div class="book-row" onclick="filterByBook(${JSON.stringify(name)})">
        <div class="book-row-name">${esc(name)}</div>
        <div class="book-row-count">${count}</div>
      </div>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="browse-section">
      <div class="section-head">Browse by book</div>
      <div class="book-list">${rows}</div>
    </div>`;

  const bookCount = Object.keys(bookMap).length;
  document.getElementById('statsBar').innerHTML =
    `<b>${allRecipes.length.toLocaleString()}</b> recipes across ${bookCount} books`;
}

function filterByBook(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('clearBtn').style.display = 'block';
  doSearch(name);
}

function openDetail(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('detailTitle').textContent = r.name;
  document.getElementById('detailBook').textContent = r.sourceBook || '';

  const ings = (r.ingredients||[]).map(i => `<li>${esc(i)}</li>`).join('');
  const notes = r.authorNotes
    ? `<div class="author-notes">${esc(r.authorNotes)}</div>`
    : `<p class="no-notes">No author notes.</p>`;

  const cached = enhancementCache[id];

  document.getElementById('detailBody').innerHTML = `
    <div class="sec-label">Ingredients</div>
    <ul class="ing-list">${ings}</ul>
    <div class="sec-label">Author's Notes</div>
    ${notes}
    <button class="enhance-btn" id="enhanceBtn" onclick="runEnhancement('${id}')">
      <span class="sparkle">✦</span>
      ${cached ? 'Regenerate Enhancement' : 'Enhance This Recipe'}
    </button>
    <div id="enhancementArea">${cached ? renderReport(cached) : ''}</div>
  `;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailPanel').querySelector('.panel-body').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
}

async function runEnhancement(id) {
  const r = allRecipes.find(x => x.id === id);
  if (!r) return;

  const btn = document.getElementById('enhanceBtn');
  const area = document.getElementById('enhancementArea');

  btn.disabled = true;
  area.innerHTML = `
    <div class="enhancing-state">
      <div class="enhancing-dots"><span></span><span></span><span></span></div>
      <div class="enhancing-label">Consulting your flavor library…</div>
    </div>`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        messages: [{ role: 'user', content: buildPrompt(r) }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(b => b.text||'').join('');
    enhancementCache[id] = text;
    area.innerHTML = renderReport(text);

    btn.innerHTML = '<span class="sparkle">✦</span> Regenerate Enhancement';

    setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);

  } catch(err) {
    area.innerHTML = `<div class="error-msg">Enhancement failed: ${esc(err.message)}. Check your API key and try again.</div>`;
  }

  btn.disabled = false;
}

function buildPrompt(r) {
  const ingList = (r.ingredients||[]).join('\n- ');
  return `You are a culinary intelligence system with deep knowledge of these 7 reference books:
1. The Flavor Equation — Nik Sharma
2. The Flavor Bible — Page & Dornenburg
3. On Food and Cooking — Harold McGee
4. The Flavor Thesaurus — Niki Segnit
5. Salt, Fat, Acid, Heat — Samin Nosrat
6. Modernist Cuisine Volume 6 — Myhrvold et al.
7. The Art of Flavor — Patterson & Aftel

RECIPE: ${r.name}
SOURCE: ${r.sourceBook||'Unknown'}

INGREDIENTS:
- ${ingList}

AUTHOR NOTES: ${r.authorNotes||'None'}

Produce a focused enhancement report. No preamble. Use these exact section headings:

## FLAVOR ARCHITECTURE
Analyze the core flavor relationships. What are the dominant, supporting, and background notes? What flavor principle drives this dish?

## WHAT THE BOOKS SAY
For the 3 most relevant books, give one specific actionable insight each, referencing that book's framework:
**[Book Name]:** specific insight.

## KEY TECHNIQUE
The single most important technique principle that makes or breaks this recipe.

## TOP 3 ENHANCEMENTS
Ranked by impact:
1. **[What to change]:** Why it improves the dish.
2. **[What to change]:** Why it improves the dish.
3. **[What to change]:** Why it improves the dish.

## UNEXPECTED PAIRINGS
3 surprising but well-reasoned ingredient ideas with brief reasoning.

## COMMON MISTAKES
2 specific mistakes and how to avoid them.`;
}

function renderReport(text) {
  const sections = text.split(/^## /m).filter(Boolean);
  const html = sections.map(sec => {
    const nl = sec.indexOf('\n');
    const title = sec.slice(0, nl).trim();
    let body = sec.slice(nl + 1).trim();

    // bold **...**
    body = body.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // wrap lines in <p>
    body = body.split('\n')
      .filter(l => l.trim())
      .map(l => `<p>${l}</p>`)
      .join('');

    return `<div class="report-section">
      <div class="report-section-title">${esc(title)}</div>
      <div class="report-text">${body}</div>
    </div>`;
  }).join('');

  return `<div class="sec-label" style="margin-top:8px">Enhancement Report</div><div class="report-wrap">${html}</div>`;
}

// swipe back
let touchStartX = 0;
const panel = document.getElementById('detailPanel');
panel.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
panel.addEventListener('touchend', e => {
  if (touchStartX < 40 && e.changedTouches[0].clientX - touchStartX > 60) closeDetail();
}, { passive: true });

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function hlText(text, terms) {
  let r = text;
  for (const t of terms) {
    r = r.replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
  }
  return r;
}

function shortBook(src) {
  if (!src) return 'Unknown';
  const parts = src.split(/\s*[—–]\s*/);
  return parts.length > 1 ? parts[0].trim() : src.split(',')[0].trim();
}
